<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>공사 안내문 편집기</title>
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans KR',sans-serif;background:#eef2ef;}
header{background:#507b61;color:white;padding:16px;text-align:center;font-size:18px;font-weight:500;}
.sec{background:white;border-radius:12px;margin:10px 0 10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec h3{font-size:13px;font-weight:500;color:#507b61;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e4ede7;}
.sec input[type=text]{display:block;width:100%;border:none;border-bottom:1px solid #d0ddd4;padding:8px 4px;font-family:'IBM Plex Sans KR',sans-serif;font-size:15px;outline:none;background:transparent;margin-bottom:6px;}
.sec input[type=text]:focus{border-bottom-color:#507b61;}
.lbl{font-size:11px;color:#888;margin-top:6px;margin-bottom:2px;padding-left:4px;}
.sch-hdr{display:grid;grid-template-columns:92px 1fr 52px 28px;gap:4px;padding:0 0 4px 0;border-bottom:1px solid #e8e8e8;margin-bottom:6px;}
.sch-hdr span{font-size:11px;color:#aaa;font-weight:500;padding:0 2px;}
.sch-row{display:grid;grid-template-columns:92px 1fr 52px 28px;gap:4px;margin-bottom:6px;align-items:center;}
.sch-row input,.sch-row select{border:1px solid #d8e4dc;padding:7px 6px;font-family:'IBM Plex Sans KR',sans-serif;font-size:14px;outline:none;background:white;width:100%;}
.sch-row select{padding:7px 2px;text-align:center;}
.sch-row input:focus,.sch-row select:focus{border-color:#507b61;}
.btn-del{width:28px;height:28px;background:none;border:1px solid #ddd;border-radius:50%;cursor:pointer;color:#aaa;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.btn-del:active{background:#fee;}
.row-cnt{font-size:12px;color:#888;margin-bottom:8px;}
#btn-add{display:flex;align-items:center;gap:4px;background:none;border:1.5px dashed #507b61;border-radius:8px;padding:8px 14px;color:#507b61;font-family:'IBM Plex Sans KR',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;}
#btn-add:disabled{opacity:0.4;cursor:not-allowed;}
#btn-print{display:block;width:100%;background:#507b61;color:white;border:none;border-radius:12px;padding:16px;font-family:'IBM Plex Sans KR',sans-serif;font-size:16px;font-weight:500;cursor:pointer;}
#btn-print:active{background:#3d5f4a;}

/* ── 모바일 (기본) ── */
#layout{display:flex;flex-direction:column;}
#form-panel{padding:0 12px 24px;order:1;}
#form-panel header{margin:0 -12px 12px;border-radius:0;}
.panel-header{display:none;}/* 모바일: 사이드바 헤더 숨김 */
#preview-col{order:2;padding:0 12px 32px;display:flex;flex-direction:column;gap:30px;}
#preview{background:white;box-shadow:0 2px 12px rgba(0,0,0,.12);border-radius:4px;overflow:hidden;}
#preview svg{width:100%;height:auto;display:block;}

/* ── PC (768px 이상) ── */
@media(min-width:768px){
  body{overflow-y:scroll;}
  header{display:none;}
  #layout{flex-direction:row;align-items:flex-start;max-width:1200px;margin:0 auto;padding:24px 24px;gap:28px;}
  #form-panel{order:1;width:380px;flex-shrink:0;padding:0;position:sticky;top:24px;max-height:calc(100vh - 48px);overflow-y:auto;}
  .panel-header{display:block;background:#507b61;color:white;padding:14px 16px;text-align:center;font-size:17px;font-weight:500;border-radius:12px 12px 0 0;margin-bottom:0;}
  #form-panel .sec{border-radius:0;margin:0}
  #form-panel .sec:last-of-type{border-radius:0 0 12px 12px;}
  #preview-col{order:2;flex:1;padding:0;display:flex;flex-direction:column;gap:16px;}
  #preview{border-radius:8px;}
  #btn-print{border-radius:10px;padding:14px;}
}
</style>
</head>
<body>
<header>공사 안내문 편집기</header>
<div id="layout">
  <div id="form-panel">
    <div class="panel-header">공사 안내문 편집기</div>
    <div class="sec">
      <h3>안내 문구 (4줄)</h3>
      <input id="f-intro-0" type="text" placeholder="첫째 줄">
      <input id="f-intro-1" type="text" placeholder="둘째 줄">
      <input id="f-intro-2" type="text" placeholder="셋째 줄">
      <input id="f-intro-3" type="text" placeholder="넷째 줄">
    </div>
    <div class="sec">
      <h3>공사 정보</h3>
      <div class="lbl">공사기간</div>
      <input id="f-period" type="text" placeholder="예: 4월14일 ~ 4월30일">
      <div class="lbl">공간세대</div>
      <input id="f-unit" type="text" placeholder="예: 1403동 303호">
      <div class="lbl">공사업체</div>
      <input id="f-company" type="text" placeholder="예: 에이치그리다">
      <div class="lbl">담당전화</div>
      <input id="f-phone" type="text" placeholder="예: 02-000-0000">
    </div>
    <div class="sec">
      <h3>공사 일정</h3>
      <div class="row-cnt" id="row-cnt-label">0행 / 최대 10행</div>
      <div class="sch-hdr">
        <span>날짜</span>
        <span>작업내용</span>
        <span style="text-align:center">소음</span>
        <span></span>
      </div>
      <div id="sch-rows"></div>
      <button id="btn-add">+ 행 추가</button>
    </div>
  </div>
  <div id="preview-col">
    <div id="preview">

<script>
// ===== 상수 =====
const ROW_PITCH = 30;
const TABLE_BOTTOM = 737.78;
const SEC2_NATIVE_TOP = 444;
const SEC1_NATIVE_TOP = 256;
const SEC1_HEIGHT = 156;
const INTRO_END = 248;
const SEC2_HEADER_H = 33;
const TOP_Y = 158; // 파란1번선: N≥8일 때 인트로 텍스트 최상단 y
const SVGNS = 'http://www.w3.org/2000/svg';

// ===== 기본값 =====
const DEFAULTS = {
  intro: [
    '안녕하세요. 파크자이 1403동 이웃 여러분.',
    '1403동 303호에서 인테리어 리모델링 공사를 할 예정입니다.',
    '공사기간 동안 이웃분들에게 최대한 불편이 없도록 소음, 분진 등을',
    '철저히 관리하며 안전하고 신속하게 진행하도록 하겠습니다.'
  ],
  period: '4월14일 ~ 4월30일',
  unit: '1403동 303호',
  company: '에이치그리다',
  phone: '010-7113-7979',
  rows: [
    {date:'4/14', work:'철거 작업', noise:'강'},
    {date:'4/15', work:'바닥 공사', noise:'중'},
    {date:'4/16', work:'도배 작업', noise:'소'},
    {date:'4/17', work:'타일 공사', noise:'중'},
    {date:'4/18', work:'마감 작업', noise:'소'},
    {date:'4/19', work:'청소', noise:'소'},
    {date:'4/20', work:'최종 점검', noise:'소'}
  ]
};

// ===== 레이아웃 계산 =====
function calcLayout(N, sec1BBox) {
  const topDeltaY = N >= 8 ? TOP_Y - 173 : 0;
  const introBottom = INTRO_END + topDeltaY;

  const tableBottom = N === 10 ? 762 : TABLE_BOTTOM;
  const firstRowTop = tableBottom - N * ROW_PITCH;
  const tableAreaTop = firstRowTop - SEC2_HEADER_H;
  const sec2DeltaY = tableAreaTop - SEC2_NATIVE_TOP;

  // sec1 시각적 정중앙 배치:
  // getBBox()로 실제 렌더링 크기를 알면 정확히 계산, 없으면 상수 사용
  let sec1DeltaY;
  if (sec1BBox && sec1BBox.height > 0) {
    // deltaY = (introBottom + tableAreaTop - 2*bbox.y - bbox.height) / 2
    sec1DeltaY = (introBottom + tableAreaTop - 2 * sec1BBox.y - sec1BBox.height) / 2;
  } else {
    const sec1ActualTop = (introBottom + tableAreaTop - SEC1_HEIGHT) / 2;
    sec1DeltaY = sec1ActualTop - SEC1_NATIVE_TOP;
  }

  return { topDeltaY, sec1DeltaY, sec2DeltaY, firstRowTop };
}

// ===== SVG 헬퍼 =====
function svgEl(tag, attrs, cls) {
  const el = document.createElementNS(SVGNS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (cls) el.setAttribute('class', cls);
  return el;
}

// ===== 테이블 렌더링 =====
function renderTable() {
  const rows = getRows();
  const N = rows.length;

  // sec1 실제 렌더링 크기 측정 (translate 초기화 후 측정)
  const sec1El = document.getElementById('sec1');
  sec1El.setAttribute('transform', 'translate(0,0)');
  let sec1BBox;
  try { sec1BBox = sec1El.getBBox(); } catch(e) {}

  const { topDeltaY, sec1DeltaY, sec2DeltaY, firstRowTop } = calcLayout(N, sec1BBox);

  // 인트로 텍스트 이동 (N≥8일 때 위로 올림)
  [173, 197, 221, 245].forEach((y, i) => {
    const el = document.getElementById(`t-intro-${i}`);
    if (el) el.setAttribute('y', String(y + topDeltaY));
  });

  // 섹션2(user=불편을..): 정중앙 위치 적용
  sec1El.setAttribute('transform', `translate(0,${sec1DeltaY})`);
  // 섹션3(user=공사일정): 항상 하단 고정
  const sec2El = document.getElementById('sec2');
  sec2El.setAttribute('transform', `translate(0,${sec2DeltaY})`);

  // 기존 테이블 요소 삭제
  const tbl = document.getElementById('sec2-table');
  while (tbl.firstChild) tbl.removeChild(tbl.firstChild);

  // sec2 좌표계 기준 y (sec2DeltaY 만큼 보정)
  const relY = (absY) => absY - sec2DeltaY;

  const ftY = relY(firstRowTop); // first row top (relative to sec2 group)
  const tbY = relY(TABLE_BOTTOM); // table bottom (relative to sec2 group)

  // 외곽선 및 컬럼 구분선 없음 (가로선만 사용)

  // 행 콘텐츠
  rows.forEach((row, i) => {
    const rowY = ftY + i * ROW_PITCH;
    const textY = rowY + 21;

    // 행 구분선 (첫 행 제외)
    if (i > 0) {
      tbl.appendChild(svgEl('line', {
        x1:'77', y1:String(rowY), x2:'518', y2:String(rowY),
        stroke:'#c8d8cb', 'stroke-width':'1'
      }, 'tbl-el'));
    }

    // 날짜 — 셀 중앙정렬 (날짜열: x=77~179, 중앙 x=128)
    const td = svgEl('text', {
      id:`t-row-${i}-date`, x:'128', y:String(textY),
      'font-family':"'IBM Plex Sans KR',sans-serif", 'font-size':'14',
      fill:'#222', 'text-anchor':'middle'
    }, 'tbl-el');
    td.textContent = row.date || '';
    tbl.appendChild(td);

    // 작업내용 — 셀 중앙정렬 (작업열: x=179~395, 중앙 x=287)
    const tw = svgEl('text', {
      id:`t-row-${i}-work`, x:'287', y:String(textY),
      'font-family':"'IBM Plex Sans KR',sans-serif", 'font-size':'14',
      fill:'#222', 'text-anchor':'middle'
    }, 'tbl-el');
    tw.textContent = row.work || '';
    tbl.appendChild(tw);

    // 소음강도 — 셀 중앙정렬 (소음열: x=395~518, 중앙 x=457)
    const tn = svgEl('text', {
      id:`t-row-${i}-noise`, x:'457', y:String(textY),
      'font-family':"'IBM Plex Sans KR',sans-serif", 'font-size':'14',
      fill:'#222', 'text-anchor':'middle'
    }, 'tbl-el');
    tn.textContent = row.noise ? '소음강도 - ' + row.noise : '';
    tbl.appendChild(tn);
  });
}

// ===== 행 데이터 읽기 =====
function getRows() {
  const rows = [];
  document.querySelectorAll('#sch-rows .sch-row').forEach(r => {
    rows.push({
      date: r.querySelector('.r-date').value,
      work: r.querySelector('.r-work').value,
      noise: r.querySelector('.r-noise').value
    });
  });
  return rows;
}

// ===== 폼 → SVG 동기화 =====
function syncAll() {
  // 인트로
  for (let i = 0; i < 4; i++) {
    document.getElementById(`t-intro-${i}`).textContent =
      document.getElementById(`f-intro-${i}`).value;
  }
  // 공사 정보
  document.getElementById('t-period').textContent = document.getElementById('f-period').value;
  document.getElementById('t-unit').textContent = document.getElementById('f-unit').value;
  document.getElementById('t-company').textContent = document.getElementById('f-company').value;
  document.getElementById('t-phone').textContent = document.getElementById('f-phone').value;
  // 테이블
  renderTable();
}

// ===== 행 추가/삭제 =====
function addRow(data) {
  const container = document.getElementById('sch-rows');
  const rowCount = container.querySelectorAll('.sch-row').length;
  if (rowCount >= 10) return;

  const div = document.createElement('div');
  div.className = 'sch-row';
  div.innerHTML = `
    <input type="text" class="r-date" placeholder="날짜" value="${(data&&data.date)||''}">
    <input type="text" class="r-work" placeholder="작업내용" value="${(data&&data.work)||''}">
    <select class="r-noise">
      <option${(data&&data.noise)==='강'?' selected':''}>강</option>
      <option${(data&&data.noise)==='중'?' selected':''}>중</option>
      <option${(!data||data.noise==='소')?' selected':''}>소</option>
    </select>
    <button class="btn-del" type="button">×</button>
  `;
  div.querySelector('.btn-del').addEventListener('click', () => {
    const cnt = document.querySelectorAll('#sch-rows .sch-row').length;
    if (cnt <= 5) { alert('최소 5행이 필요합니다.'); return; }
    div.remove();
    updateRowCountLabel();
    syncAll();
  });
  div.querySelectorAll('input,select').forEach(el => el.addEventListener('input', syncAll));
  container.appendChild(div);
  updateRowCountLabel();
  document.getElementById('btn-add').disabled = (container.querySelectorAll('.sch-row').length >= 10);
}

function updateRowCountLabel() {
  const cnt = document.querySelectorAll('#sch-rows .sch-row').length;
  document.getElementById('row-cnt-label').textContent = `${cnt}행 / 최대 10행`;
  document.getElementById('btn-add').disabled = (cnt >= 10);
}

// ===== PDF 저장 =====
document.getElementById('btn-print').addEventListener('click', function() {
  const btn = this;
  btn.textContent = '생성 중...';
  btn.disabled = true;

  const svgEl = document.querySelector('#preview svg');
  const W = 595 * 3, H = 842 * 3;
  const styleEl = document.createElementNS('http://www.w3.org/2000/svg','style');
  styleEl.textContent = "@import url(\'https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500&display=swap\')";
  svgEl.insertBefore(styleEl, svgEl.firstChild);
  const svgStr = new XMLSerializer().serializeToString(svgEl);
  svgEl.removeChild(styleEl);
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const imgData = canvas.toDataURL('image/jpeg', 0.97);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
    doc.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    doc.save('공사안내문.pdf');
    btn.textContent = 'PDF로 저장';
    btn.disabled = false;
  };
  img.onerror = function() {
    btn.textContent = 'PDF로 저장';
    btn.disabled = false;
    alert('PDF 생성에 실패했습니다. 다시 시도해 주세요.');
  };
  img.src = url;
});

// ===== 초기화 =====
(function init() {
  // 인트로 기본값
  DEFAULTS.intro.forEach((v, i) => {
    document.getElementById(`f-intro-${i}`).value = v;
  });
  // 공사 정보 기본값
  document.getElementById('f-period').value = DEFAULTS.period;
  document.getElementById('f-unit').value = DEFAULTS.unit;
  document.getElementById('f-company').value = DEFAULTS.company;
  document.getElementById('f-phone').value = DEFAULTS.phone;

  // 행 기본값
  DEFAULTS.rows.forEach(r => addRow(r));

  // 폼 이벤트
  document.querySelectorAll('#form-panel input[type=text]').forEach(
    el => el.addEventListener('input', syncAll)
  );
  document.getElementById('btn-add').addEventListener('click', () => {
    addRow({date:'', work:'', noise:'소'});
    syncAll();
  });

  // 초기 SVG 동기화
  syncAll();
})();
</script>
